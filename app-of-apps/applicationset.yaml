apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mif-platform-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/EvgheniAlexeev/mif-gitops.git
        revision: main
        directories:
          - path: overlays/*
  template:
    metadata:
      name: '{{path.basename}}'
      labels:
        app.kubernetes.io/part-of: mif-platform
    spec:
      project: default
      source:
        repoURL: https://github.com/EvgheniAlexeev/mif-gitops.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
