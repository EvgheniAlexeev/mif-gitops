apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: infrastructure-secrets
                  key: keycloak-admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrastructure-secrets
                  key: keycloak-admin-password
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: infrastructure-secrets
                  key: keycloak-db-url
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: infrastructure-secrets
                  key: keycloak-db-username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infrastructure-secrets
                  key: keycloak-db-password
