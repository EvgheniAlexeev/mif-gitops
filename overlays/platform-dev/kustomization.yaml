apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-dev

resources:
  - ../../base
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: payment-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: identity-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
