---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mif-platform-staging-ingress
  namespace: platform-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: staging.mif-platform.local
      http:
        paths:
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 8080
          - path: /api/identity
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8080
